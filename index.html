<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>D'anni Luxe Glam — Y2K Outlet</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Nunito:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,500&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  body {
    font-family: 'Nunito', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  button { font-family: inherit; }
  @keyframes shimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  @keyframes twinkle { 0%,100%{opacity:.3;transform:scale(.8) rotate(0deg)} 50%{opacity:1;transform:scale(1.2) rotate(180deg)} }
  @keyframes tickerScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.5)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
  @keyframes pop { from{transform:scale(.9);opacity:0} to{transform:scale(1);opacity:1} }

  .variant-switcher{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:500; background:rgba(20,10,18,.85); backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.15); border-radius:999px;
    padding:5px; display:flex; gap:4px;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  .variant-switcher button{
    background:transparent; border:none; color:#fff9fb;
    padding:8px 18px; font-size:11px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; cursor:pointer;
    border-radius:999px; transition:all .2s;
    font-family:'Nunito',sans-serif;
  }
  .variant-switcher button.active{
    background:linear-gradient(135deg, #ff8fc8, #c9a84c);
    color:#1a0810;
  }
  .variant-switcher .dot{
    font-size:8px; margin-right:6px; vertical-align:middle; opacity:.7;
  }

  .wa-float{
    position:fixed; bottom:24px; left:24px; z-index:300;
    width:54px; height:54px; border-radius:50%;
    background:#25D366; color:#fff; border:none;
    font-size:24px; cursor:pointer;
    box-shadow:0 6px 20px rgba(37,211,102,.4);
    display:flex; align-items:center; justify-content:center;
    transition:transform .2s;
  }
  .wa-float:hover{ transform:scale(1.08); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://www.paypal.com/sdk/js?client-id=BAAVMdE524MtE_8WKLJ-_S_NLg_dGYhU9g_R1bO3cbsbgcRplArmu9NCGxO_eVWqNuuD11fvi2C7d_7evo&components=hosted-buttons&disable-funding=venmo&currency=USD" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="cart.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useReducer } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "variant": "B",
      "dark": true,
      "darkB": false,
      "accentA": "#c4607e",
      "accent2A": "#c9a84c",
      "headingFont": "DM Serif",
      "bodyFont": "Nunito",
      "cardStyle": "soft"
    }/*EDITMODE-END*/;

    const fontMap = {
      'Italiana': "'Italiana', serif",
      'Cormorant': "'Cormorant Garamond', serif",
      'DM Serif': "'DM Serif Display', serif",
      'Nunito': "'Nunito', sans-serif",
      'Inter': "'Inter', sans-serif",
    };

    function reducer(state, action){
      switch(action.type){
        case 'addToCart': {
          const existing = state.cart.find(i => i.id === action.product.id);
          if (existing) {
            if (existing.qty >= action.product.stock) return state;
            return { ...state, cart: state.cart.map(i => i.id === action.product.id ? {...i, qty: i.qty+1} : i) };
          }
          return { ...state, cart: [...state.cart, { id: action.product.id, price: action.product.price, qty: 1 }] };
        }
        case 'removeFromCart':
          return { ...state, cart: state.cart.filter(i => i.id !== action.id) };
        case 'updateQty': {
          if (action.qty <= 0) return { ...state, cart: state.cart.filter(i => i.id !== action.id) };
          return { ...state, cart: state.cart.map(i => i.id === action.id ? {...i, qty: action.qty} : i) };
        }
        case 'clearCart': return { ...state, cart: [] };
        case 'setFilter': return { ...state, filter: action.value };
        case 'setSearch': return { ...state, search: action.value };
        case 'openCart': return { ...state, cartOpen: true };
        case 'closeCart': return { ...state, cartOpen: false };
        case 'openProduct': return { ...state, productOpen: action.product };
        case 'closeProduct': return { ...state, productOpen: null };
        default: return state;
      }
    }

    function App(){
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [state, dispatch] = useReducer(reducer, {
        cart: [],
        filter: 'todos',
        search: '',
        cartOpen: false,
        productOpen: null,
      });

      const resolvedTweaks = {
        ...tweaks,
        headingFont: fontMap[tweaks.headingFont] || fontMap.Italiana,
        bodyFont: fontMap[tweaks.bodyFont] || fontMap.Nunito,
      };

      const variant = tweaks.variant || 'A';

      return (
        <>
          <div className="variant-switcher">
            <button className={variant === 'A' ? 'active' : ''} onClick={() => setTweak('variant', 'A')}>
              <span className="dot">●</span>Candy Holográfico
            </button>
            <button className={variant === 'B' ? 'active' : ''} onClick={() => setTweak('variant', 'B')}>
              <span className="dot">●</span>Chrome Noir
            </button>
          </div>

          {variant === 'A' ? (
            <VariationA state={state} dispatch={dispatch} tweaks={resolvedTweaks} />
          ) : (
            <VariationB state={state} dispatch={dispatch} tweaks={resolvedTweaks} />
          )}

          <CartDrawer open={state.cartOpen} cart={state.cart} dispatch={dispatch} variant={variant} />
          <ProductModal product={state.productOpen} cart={state.cart} dispatch={dispatch} variant={variant} />

          <button className="wa-float" onClick={() => openWA('Hola! Vi el outlet y quiero más info ✦')}>💬</button>

          <TweaksPanel>
            <TweakSection label="General" />
            <TweakRadio label="Variación" value={tweaks.variant} options={['A','B']}
              onChange={v => setTweak('variant', v)} />

            <TweakSection label="Tipografía" />
            <TweakSelect label="Títulos" value={tweaks.headingFont}
              options={['Italiana','Cormorant','DM Serif']}
              onChange={v => setTweak('headingFont', v)} />
            <TweakSelect label="Cuerpo" value={tweaks.bodyFont}
              options={['Nunito','Inter']}
              onChange={v => setTweak('bodyFont', v)} />

            {variant === 'A' && <>
              <TweakSection label="Modo (Candy)" />
              <TweakToggle label="Modo oscuro" value={tweaks.dark}
                onChange={v => setTweak('dark', v)} />
              <TweakSection label="Paleta Candy" />
              <TweakColor label="Acento rosa" value={tweaks.accentA}
                onChange={v => setTweak('accentA', v)} />
              <TweakColor label="Acento dorado" value={tweaks.accent2A}
                onChange={v => setTweak('accent2A', v)} />
              <TweakSection label="Cartas de producto" />
              <TweakRadio label="Estilo" value={tweaks.cardStyle}
                options={['soft','sharp','pill','chrome']}
                onChange={v => setTweak('cardStyle', v)} />
            </>}

            {variant === 'B' && <>
              <TweakSection label="Modo (Chrome)" />
              <TweakToggle label="Modo oscuro" value={tweaks.darkB}
                onChange={v => setTweak('darkB', v)} />
            </>}
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
